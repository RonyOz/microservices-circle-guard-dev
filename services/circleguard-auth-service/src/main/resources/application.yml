spring:
  application:
    name: circleguard-auth-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:circleguard_auth}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  ldap:
    urls: ldap://${LDAP_HOST:localhost}:${LDAP_PORT:389}
    base: dc=circleguard,dc=edu
    username: cn=admin,dc=circleguard,dc=edu
    password: ${LDAP_PASSWORD:admin}

jwt:
  secret: "${JWT_SECRET:my-super-secret-dev-key-32-chars-long-12345678}"
  expiration: 3600000

qr:
  secret: "${QR_SECRET:my-qr-secret-key-for-dev-1234567890}"
  expiration: 300

server:
  port: 8180
