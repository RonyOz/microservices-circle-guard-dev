spring:
  application:
    name: circleguard-gateway-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

jwt:
  secret: "${JWT_SECRET:my-super-secret-dev-key-32-chars-long-12345678}"
  expiration: 3600000

qr:
  secret: "${QR_SECRET:my-qr-secret-key-for-dev-1234567890}"
  expiration: 300

server:
  port: 8083

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health